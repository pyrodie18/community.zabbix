---
- name: "Include OS-specific variables"
  ansible.builtin.include_vars: "{{ ansible_facts['os_family'] }}.yml"
  tags:
    - always

- name: Set More Variables
  ansible.builtin.set_fact:
    zabbix_db_type_long: "{{ 'postgresql' if zabbix_server_database == 'pgsql' else 'mysql' }}"
  tags:
    - always

- name: Determine Latest Supported Zabbix Version
  when: zabbix_web_version is not defined
  ansible.builtin.set_fact:
    zabbix_web_version: "{{ _zabbix_web_valid_versions[_os_key] | default(['7.4']) | first }}"
  tags:
    - always

- name: Check that version is supported
  when: zabbix_web_version_check | bool
  ansible.builtin.assert:
    that:
      - (zabbix_web_version | string) in _zabbix_web_valid_versions[_os_key]
    fail_msg: Zabbix version {{ zabbix_web_version }} is not supported on {{ _os_key }}
  tags:
    - always

- name: Install Repository
  ansible.builtin.include_role:
    name: community.zabbix.zabbix_repo
  vars:
    zabbix_repo_version: "{{ zabbix_web_version }}"
    zabbix_repo_package: "zabbix-web-service"
  when: zabbix_manage_repo | default(true)

- name: "Configure SELinux when enabled"
  ansible.builtin.include_tasks: selinux.yml
  when: ansible_facts.selinux.status | default('disabled') == 'enabled'

- name: "Install zabbix-web packages"
  ansible.builtin.package:
    name: "{{ zabbix_web_packages }}"
    state: "{{ zabbix_web_package_state }}"
    update_cache: true
    disablerepo: "{{ zabbix_web_disable_repo | default(_zabbix_web_disable_repo | default(omit)) }}"
  environment:
    http_proxy: "{{ zabbix_http_proxy | default('') }}"
    https_proxy: "{{ zabbix_https_proxy | default('') }}"
  register: _zabbix_web_package_installed
  until: _zabbix_web_package_installed is succeeded
  become: true
  tags:
    - install

- name: "Debian | Link graphfont.ttf (workaround ZBX-10467)"
  when: 
    - ansible_facts['os_family'] == 'Debian'
    - zabbix_web_version is version ('7.2', '<')
  ansible.builtin.file:
    src: "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf"
    path: "/usr/share/zabbix/fonts/graphfont.ttf"
    state: link
  become: true
  tags:
    - install

- name: Determine PHP Version
  ansible.builtin.command:
    cmd: php --version
  register: _zabbix_web_php_installed_version
  changed_when: false
  tags:
    - config
    - install

- name: Set PHP Version
  ansible.builtin.set_fact:
    zabbix_web_php_installed_version: "{{ _php_version[ansible_facts.os_family] }}"
  vars:
    _php_version_query: 'PHP\s*(\d+\.\d+)\.\d+'
    _php_version:
      Debian: "{{ _zabbix_web_php_installed_version.stdout | regex_search(_php_version_query, '\\1') | first }}" # }}"
      RedHat: "{{ _zabbix_web_php_installed_version.stdout | regex_search(_php_version_query, '\\1') | first | regex_replace('\\.', '') }}"
      Suse:   "{{ _zabbix_web_php_installed_version.stdout | regex_search(_php_version_query, '\\1') | first | regex_replace('(\\d+)\\.\\d+', '\\1') }}"
  tags:
    - config
    - install

- name: "Create /etc/zabbix/web directory"
  ansible.builtin.file:
    path: /etc/zabbix/web
    owner: "{{ zabbix_php_fpm_conf_user }}"
    group: "{{ _group[ansible_facts.os_family] | default(zabbix_php_fpm_conf_group) }}"
    state: directory
    mode: "{{ _mode[ansible_facts.os_family] | default('0755') }}"
  become: true
  vars:
    _group:
      Debian: root
    _mode:
      Suse: "0750"
  tags:
    - install
    - config

- name: "Configure zabbix-web"
  ansible.builtin.template:
    src: zabbix.conf.php.j2
    dest: /etc/zabbix/web/zabbix.conf.php
    owner: "{{ zabbix_php_fpm_conf_user }}"
    group: "{{ zabbix_php_fpm_conf_group }}"
    mode: "{{ zabbix_web_conf_mode }}"
  become: true
  tags:
    - config

- name: "Configure PHP-FPM"
  when: zabbix_web_create_php_fpm
  become: true
  tags:
    - config
  block:
    - name: "Create PHP-FPM pool for zabbix"
      ansible.builtin.template:
        src: php-fpm.conf.j2
        dest: "{{ zabbix_web_php_fpm_conf_file }}"
        owner: root
        group: root
        mode: 0644
      notify:
        - restart php-fpm

    - name: Debian family symlinks
      when:
        - ansible_facts['os_family'] == 'Debian'
        - zabbix_web_php_fpm_conf_file == '/etc/zabbix/php-fpm.conf'
      block:
        - name: Add symlinks
          ansible.builtin.file:
            path: "{{ zabbix_php_fpm_dir }}/zabbix-php-fpm.conf"
            state: link
            src: "{{ zabbix_web_php_fpm_conf_file }}"
            owner: root
            group: root

        - name: Remove legacy PHP-FPM pool
          ansible.builtin.file:
            path: "{{ zabbix_php_fpm_dir }}/zabbix.conf"
            state: absent

    - meta: flush_handlers

    - name: "Ensure PHP-FPM is running"
      ansible.builtin.service:
        name: "{{ _php_fpm_service[ansible_facts['os_family']] | default('php-fpm') }}"
        state: started
        enabled: true
      vars:
        _php_fpm_service:
          Debian: "php{{ zabbix_web_php_installed_version }}-fpm"

- name: "Configure http server"
  ansible.builtin.include_tasks: "{{ zabbix_web_http_server }}.yml"

- meta: flush_handlers

- name: "Ensure http server is running"
  ansible.builtin.service:
    name: "{{ zabbix_web_http_service }}"
    state: started
    enabled: true
