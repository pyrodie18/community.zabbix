---
- name: Verify zabbix_proxy
  hosts: all
  gather_facts: true

  tasks:
    - name: Gather package facts
      ansible.builtin.package_facts:

    - name: Assert zabbix-proxy package is installed with correct version
      ansible.builtin.assert:
        that:
          - "'zabbix-proxy-' ~ zabbix_proxy_database in ansible_facts.packages"
          - zabbix_proxy_version in (ansible_facts.packages['zabbix-proxy-' ~ zabbix_proxy_database] | first).version

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Assert zabbix-proxy service is enabled and running
      ansible.builtin.assert:
        that:
          - ansible_facts.services['zabbix-proxy.service'].status == 'enabled'
          - ansible_facts.services['zabbix-proxy.service'].state == 'running'

    - name: Stat zabbix_proxy.conf
      ansible.builtin.stat:
        path: /etc/zabbix/zabbix_proxy.conf
      register: _proxy_conf

    - name: Assert zabbix_proxy.conf exists with correct ownership and mode
      ansible.builtin.assert:
        that:
          - _proxy_conf.stat.exists
          - _proxy_conf.stat.pw_name == 'zabbix'
          - _proxy_conf.stat.gr_name == 'zabbix'
          - _proxy_conf.stat.mode == '0640'

    - name: Read zabbix_proxy.conf
      ansible.builtin.slurp:
        src: /etc/zabbix/zabbix_proxy.conf
      register: _proxy_conf_content

    - name: Assert zabbix_proxy.conf contains expected settings
      ansible.builtin.assert:
        that:
          - "'ListenPort=10051' in _proxy_conf_content.content | b64decode"
          - "'DebugLevel=3' in _proxy_conf_content.content | b64decode"

    - name: Stat zabbix_proxy.d include directory
      ansible.builtin.stat:
        path: /etc/zabbix/zabbix_proxy.d
      register: _proxy_include_dir

    - name: Assert include directory exists with correct ownership
      ansible.builtin.assert:
        that:
          - _proxy_include_dir.stat.exists
          - _proxy_include_dir.stat.isdir
          - _proxy_include_dir.stat.pw_name == 'zabbix'
          - _proxy_include_dir.stat.gr_name == 'zabbix'

    - name: Check zabbix_proxy.log
      block:
        - name: Read zabbix_proxy log file
          ansible.builtin.slurp:
            src: /var/log/zabbix/zabbix_proxy.log
          register: _proxy_log
          until: >
            (_proxy_log.content | b64decode) is not search('Access denied for user') and
            (_proxy_log.content | b64decode) is not search('database is down: reconnecting') and
            (_proxy_log.content | b64decode) is not search('Both are missing in the system.') and
            (_proxy_log.content | b64decode) is search('current database version') and
            (_proxy_log.content | b64decode) is search('proxy #0 started \[main process\]') and
            (_proxy_log.content | b64decode) is search('received configuration data from server')
          retries: 12
          delay: 10
      always:
        - debug:
            msg: "{{ _proxy_log.content | b64decode | split('\n') }}"
