---
- name: Create
  hosts: localhost
  connection: local

  gather_facts: false

  vars:
    _version_groups: ["v60", "v70", "v72", "v74", "v80"]
    _g_to_v:
      v60: "6.0"
      v70: "7.0"
      v72: "7.2"
      v74: "7.4"
      v80: "8.0"

  pre_tasks:
    - name: Create network
      community.docker.docker_network:
        name: zabbix

    - name: Create dependency/integration containers
      vars:
        _database_groups: ['mysql', 'pgsql']
        _db_type: "{{ item.groups | intersect(_database_groups) | first }}"
      block:
        - name: Create Zabbix server database container(s)
          community.docker.docker_container:
            name: "{{ item.name }}-db"
            image: "{{ _container[_db_type].image }}"
            state: started
            recreate: true
            networks:
              - name: zabbix
            env: "{{ _container[_db_type].env }}"
          loop: "{{ molecule_yml.platforms }}"
          loop_control:
            label: "{{ item.name }}-db"
          when: (item.groups | intersect(_database_groups) | length) > 0
          vars:
            _container:
              mysql:
                image: "mysql:8.4.8"
                env: { MYSQL_ROOT_PASSWORD: changeme }
              pgsql:
                image: "timescale/timescaledb:latest-pg13"
                env:
                  POSTGRES_USER: zabbix
                  POSTGRES_PASSWORD: zabbix

        - name: Create Zabbix server container(s)
          community.docker.docker_container:
            name: "{{ item.name }}-server"
            image: "zabbix/zabbix-server-{{ _db_type }}:alpine-{{ _g_to_v[_version] }}-latest"
            state: started
            recreate: true
            networks:
              - name: zabbix
            env: "{{ _container[_db_type].env }}"
          loop: "{{ molecule_yml.platforms }}"
          loop_control:
            label: "{{ item.name }}-server"
          vars:
            _version: "{{ item.groups | intersect(_version_groups) | first }}"
            _container:
              mysql:
                env:
                  MYSQL_ROOT_PASSWORD: changeme
                  MYSQL_USER: zabbix
                  MYSQL_PASSWORD: zabbix
                  DB_SERVER_HOST: "{{ item.name }}-db"
              pgsql:
                env:
                  POSTGRES_USER: zabbix
                  POSTGRES_PASSWORD: zabbix
                  DB_SERVER_HOST: "{{ item.name }}-db"

  tasks:
    - name: Create OS container(s)
      community.docker.docker_container:
        state: started
        recreate: true
        name: "{{ item.name }}"
        image: "{{ item.image }}"
        privileged: "{{ item.privileged | default(omit) }}"
        command: "{{ item.command | default(omit) }}"
        networks:
          - name: zabbix
        volumes: "{{ item.volumes | default(omit) }}"
        cgroupns_mode: "{{ item.cgroupns_mode | default(omit) }}"
        published_ports:
          - "{{ 8000 + ansible_loop.index0 }}:80"
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        label: "{{ item.name }}"
        extended: true
